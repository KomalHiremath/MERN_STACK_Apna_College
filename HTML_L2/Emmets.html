<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- parent-child relationship
    cmd: p>div => here p is parent and div is child  -->
    <p>
        <div></div>
    </p>

    <!-- siblings relationship
    cmd: p>div+img => here p is parent and div & img are siblings and child of p  -->
    <p>
        <div></div>
        <img src="" alt="">
    </p>

    <!-- div+main+img -->
    <div></div>
    <main></main>
    <img src="" alt="">

    <!-- ul>li*5 -->
    <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

</body>
</html>
