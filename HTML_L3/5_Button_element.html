<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<body>
    <!-- No behavior on clicking -->
    <button>Click me</button> 

    <!--Information is submitted to /server file upon clicking-->
    <form action="/server">
        <label for="username">Enter the username:</label>
        <input type = "text" placeholder ="enter the username" id="username">
        <br>

    <button>Submit</button>
    <br>

    <button type ="submit">Submit</button>
    <br>

    <button type ="button">Button Submit</button>
    <br>

    <button type ="Reset">Reset</button>
    <br>

    <!-- button using input element NOT ADVISABLE TO USE  -->
     <input type="button" value="Click me">
     <input type="submit" value="Click me 2">





    </form>
    
    
</body>
</html>
