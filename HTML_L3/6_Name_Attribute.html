<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<body>
    <!-- http://127.0.0.1:5500/server? -->
     <form action="/server">
        <label for="username">Enter the username:</label>
        <input type = "text" placeholder ="enter the username" id="username">
        <br>

    <button>Submit</button>
    <br>

    <!--Information is submitted to /server file upon clicking-->
    <!-- http://127.0.0.1:5500/server?customername=komal -->
     <form action="/server">
        <label for="username">Enter the username:</label>
        <input type = "text" placeholder ="enter the username" id="username" name="customer_name">
        <br>

    <button>Submit</button>
    <br> 
    </form>

    <form action="https://www.youtube.com/results?">
        <input type= "text" placeholder = "want to see?" name = "search_query" >
        <button>Search</button>
    </form>

    
    
</body>
</html>
